<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://app.dropimus.com" />
    <link rel="icon" href="/favicon/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <title>Dropimus</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var boundFetch = originalFetch ? originalFetch.bind(window) : undefined;
          var customFetch = boundFetch;
          
          function patchObject(obj) {
            if (!obj) return;
            try {
              var desc = Object.getOwnPropertyDescriptor(obj, 'fetch');
              if (desc && !desc.configurable) {
                return;
              }
              Object.defineProperty(obj, 'fetch', {
                get: function() { return customFetch; },
                set: function(val) { customFetch = val; },
                configurable: true,
                enumerable: false
              });
            } catch (e) {
              // Ignore
            }
          }

          patchObject(window);
          if (typeof globalThis !== 'undefined') patchObject(globalThis);
          if (typeof self !== 'undefined') patchObject(self);
        } catch (err) {
          console.warn("Fetch sandbox patch failed:", err);
        }
      })();
    </script>
  </head>
  <body style="background-color: #050505; margin: 0; padding: 0;">
    <div id="root">
      <div style="background-color: #050505; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #FFFFFF; margin: 0; box-sizing: border-box; width: 100%;">
        <style>
          @keyframes pulse {
            0%, 100% { transform: scale(0.97); opacity: 0.65; }
            50% { transform: scale(1.03); opacity: 1; }
          }
          @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
          .pulse-logo {
            animation: pulse 2.2s ease-in-out infinite;
          }
          .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-top-color: #4D7AFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
          }
        </style>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
          <!-- Glowing drop badge -->
          <div class="pulse-logo" style="display: flex; align-items: center; justify-content: center; width: 84px; height: 84px; border-radius: 20px; background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); overflow: hidden; padding: 14px; box-sizing: border-box;">
            <img src="./src/assets/images/dlogo.png" style="width: 100%; height: 100%; object-fit: contain;" referrerPolicy="no-referrer" />
          </div>
          <div style="display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center;">
            <div style="font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #FFFFFF;">DROPIMUS</div>
            <div style="font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: rgba(255, 255, 255, 0.35);">PROVE YOU CALLED IT FIRST</div>
          </div>
          <div class="spinner" style="margin-top: 8px;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
